<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractron 9000</title>
    <style>
        html, body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- trunk compiles the Rust WASM and injects the script tag here -->
    <link data-trunk rel="rust" data-target-name="fractron9000_lib" data-wasm-opt="2" />
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
</body>
</html>
